<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anonymous Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <h2 id="welcome"></h2>
            <button id="toggle-theme" title="Toggle Theme">
                <span class="icon">🌞</span>
            </button>
        </header>

        <main id="chat-box" class="chat-box"></main>

        <form id="chat-form" class="chat-form">
            <input type="text" id="msg" placeholder="Type your message..." required autocomplete="off">
            <button type="submit">➤</button>
        </form>
    </div>

    <script>
        const socket = io();
        let username = prompt("Enter your anonymous name:") || "Anonymous";
        document.getElementById("welcome").textContent = "Welcome, " + username;

        const chatBox = document.getElementById("chat-box");
        const form = document.getElementById("chat-form");
        const msgInput = document.getElementById("msg");
        const themeBtn = document.getElementById('toggle-theme');
        const themeIcon = themeBtn.querySelector('.icon');

        // Restore theme preference
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            themeIcon.textContent = "🌙";
        }

        // Join chat
        socket.emit('join', username);

        function updateBackgroundSize() {
            chatBox.style.backgroundSize = `100% ${chatBox.scrollHeight}px`;
        }

        socket.on('message', function(data) {
            const p = document.createElement('div');
            p.classList.add("bubble");
            if (data.username === username) {
                p.classList.add("mine");
            } else {
                p.classList.add("theirs");
            }
            p.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
            chatBox.appendChild(p);

            chatBox.scrollTop = chatBox.scrollHeight;
            updateBackgroundSize();
        });

        socket.on('status', function(msg) {
            const status = document.createElement('div');
            status.classList.add("status");
            status.textContent = msg;
            chatBox.appendChild(status);

            chatBox.scrollTop = chatBox.scrollHeight;
            updateBackgroundSize();
        });

        form.onsubmit = function(e) {
            e.preventDefault();
            if (msgInput.value.trim() !== '') {
                socket.send({ username, message: msgInput.value });
                msgInput.value = '';
            }
        };

        themeBtn.onclick = () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeIcon.textContent = isDark ? "🌙" : "🌞";
            themeIcon.classList.add('rotate');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            setTimeout(() => themeIcon.classList.remove('rotate'), 500);
        };
    </script>
</body>
</html>
